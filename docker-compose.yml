services:
  api:
    container_name: search-engine-api
    build:
      context: .
    image: search-engine-bm25:latest
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - index_snapshot:/app/persistent
    ports:
      - "8000:8000"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  indexer:
    container_name: search-engine-indexer
    image: search-engine-bm25:latest
    build:
      context: .
    profiles: ["tools"]
    env_file:
      - .env
    volumes:
      - index_snapshot:/app/persistent
    command: ["/app/.venv/bin/python", "scripts/bulk_index.py"]


volumes:
  index_snapshot:
    name: index_snapshot